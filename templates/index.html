<!DOCTYPE html>
<html>
<head>
    <title>CNN Image Classifier</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f7fb;
            text-align:center;
            margin-top:40px;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.2);
        }

        h1{
            color:#2c3e50;
        }

        button{
            background:#007BFF;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }

        img{
            margin-top:20px;
            width:250px;
            border-radius:10px;
        }

        .result{
            margin-top:20px;
            font-size:22px;
            color:green;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>CNN Image Classification</h1>

    <form action="/predict" method="POST" enctype="multipart/form-data">
        <input type="file" name="image" required>
        <br><br>

        <button type="submit">Predict</button>
    </form>

    {% if image_path %}
        <img src="{{ image_path }}" alt="Uploaded Image">
    {% endif %}

    {% if prediction %}
        <div class="result">
            Prediction: {{ prediction }}
            <br><br>
            Confidence: {{ confidence }}%
        </div>
    {% endif %}

</div>

</body>
    
</html>
